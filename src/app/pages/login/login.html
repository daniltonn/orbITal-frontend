<app-background></app-background>

<div class="login-wrapper">
  
  <div class="logo">
    <img src="/assets/images/logo/Imagen.svg" alt="Orbital Logo">
  </div>

  <div class="orbital-panel">

    <div class="panel-header">
      <span class="target-icon"></span>
      <img src="/assets/images/logo/Texto.svg" alt="Logo">
    </div>

    <div class="panel-body">

      <!-- ERROR -->
      <div class="alert alert-error" *ngIf="errorMessage">
        ⚠ {{ errorMessage }}
      </div>

      <!-- EMAIL -->
      <div class="input-group">
        <i class="icon user"></i>
        <input 
          type="email" 
          placeholder="cmd@freezer.empire"
          [(ngModel)]="email"
          (keyup.enter)="login()"
        >
      </div>

      <!-- PASSWORD -->
      <div class="input-group">
        <i class="icon lock"></i>
        <input 
          type="password" 
          placeholder="••••••••"
          [(ngModel)]="password"
          (keyup.enter)="login()"
        >
      </div>

      <!-- RECORDAR SESIÓN -->
      <div class="checkbox-row">
        <input 
          type="checkbox" 
          [(ngModel)]="recordarSesion" 
          id="recordar"
        >
        <label for="recordar">Mantener sesión activa</label>
      </div>

      <!-- FORGOT -->
      <div class="forgot">
        Forgot password?
      </div>

      <!-- BOTÓN -->
      <button 
        class="login-btn"
        (click)="login()"
        [disabled]="cargando"
      >
        {{ cargando ? 'Verificando...' : 'LOGIN' }}
      </button>

    </div>
  </div>

</div>
