<app-background></app-background>
<app-sidebar></app-sidebar>

<div class="page-wrapper">

  <header class="top-bar">
    <div class="title-wrap">
      <div class="logo-icon" aria-hidden="true">
        <svg width="38" height="38" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="20" stroke="#b84fff" stroke-width="1.5" fill="rgba(100,20,180,.25)"/>
          <circle cx="24" cy="24" r="10" fill="rgba(120,40,200,.4)" stroke="#d08fff" stroke-width="1"/>
          <ellipse cx="24" cy="24" rx="22" ry="7" stroke="#9a30e0" stroke-width="1.2" fill="none" transform="rotate(-20 24 24)"/>
          <circle cx="24" cy="24" r="4" fill="#c060ff"/>
        </svg>
      </div>
      <div>
        <h1>Registrar nuevo planeta</h1>
        <p>Añade un nuevo mundo a los registros del Imperio.</p>
      </div>
    </div>

    <button type="button" class="btn-cancel-top" (click)="onCancel()" routerLink="/planetas">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      Cancelar
    </button>
  </header>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <main class="panels-layout">
      <app-planet-general-panel
        [form]="form"
        [estadoOptions]="estadoOptions"
        [galaxiaOptions]="galaxiaOptions">
      </app-planet-general-panel>
      <app-planet-resources-panel
        [form]="form"
        [atmosferaOptions]="atmosferaOptions"
        [recursoOptions]="recursoOptions">
      </app-planet-resources-panel>
    </main>
  </form>

  <div class="toast" [class.visible]="saved" role="status" aria-live="polite">
    ✓ Planeta registrado correctamente
  </div>

  <div class="toast toast-error" [class.visible]="!!errorMsg" role="alert" aria-live="assertive">
    ✕ {{ errorMsg }}
  </div>

</div>
