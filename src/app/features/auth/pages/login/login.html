<app-background></app-background>

<div class="login-wrapper">
  
  <div class="logo">
    <img src="/assets/images/logo/Imagen.svg" alt="Orbital Logo">
  </div>

  <div class="orbital-panel">

    <div class="panel-header">
      <span class="target-icon"></span>
      <img src="/assets/images/logo/Texto.svg" alt="Logo">
    </div>

    <div class="panel-body">

      <!-- ERROR -->
      <div class="alert alert-error" *ngIf="errorMessage">
        ⚠ {{ errorMessage }}
      </div>

      <div class="input-group">
  <i class="icon user"></i>

  <input
    type="email"
    [(ngModel)]="email"
    (keyup.enter)="login()"
    (focus)="emailFocus=true"
    (blur)="emailFocus=false"
  >

  <label [class.active]="emailFocus || email">
    Correo
  </label>
</div>

<div class="input-group">
  <i class="icon lock"></i>

  <input
    type="password"
    [(ngModel)]="password"
    (keyup.enter)="login()"
    (focus)="passwordFocus=true"
    (blur)="passwordFocus=false"
  >

  <label [class.active]="passwordFocus || password">
    Contraseña
  </label>
</div>

      <!-- RECORDAR SESIÓN -->
      <div class="checkbox-row">
        <input 
          type="checkbox" 
          [(ngModel)]="recordarSesion" 
          id="recordar"
        >
        <label for="recordar">Mantener sesión activa</label>
      </div>

      <!-- FORGOT -->
      <div class="forgot">
        Forgot password?
      </div>

      <!-- BOTÓN -->
      <button 
        class="login-btn"
        (click)="login()"
        [disabled]="cargando"
      >
        {{ cargando ? 'Verificando...' : 'LOGIN' }}
      </button>

    </div>
  </div>

</div>
